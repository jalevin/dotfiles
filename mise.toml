[tasks.brew]
description = "Install Homebrew packages from Brewfile"
run = "brew bundle --no-upgrade --file=install/Brewfile || true"

[tasks.brew-dump]
description = "Update Brewfile from currently installed packages"
run = """
mv install/Brewfile install/Brewfile.old
brew bundle dump --file=install/Brewfile
"""

[tasks.stow]
description = "Create symlinks via GNU Stow"
depends = ["brew"]
run = "stow -v -t ~/ home/"

[tasks.fonts]
description = "Install fonts to ~/Library/Fonts"
run = "find fonts -name '*.ttf' -exec cp {} ~/Library/Fonts/ \\;"

[tasks.neovim-setup]
description = "Sync Neovim plugins via lazy.nvim"
depends = ["stow"]
run = "nvim --headless \"+Lazy! sync\" +qa"

[tasks.neovim-reset]
description = "Remove Neovim lazy.nvim data"
run = "rm -rf ~/.local/share/nvim/lazy ~/.local/share/nvim/lazy-rocks"

[tasks.osx-settings]
description = "Apply macOS system defaults"
run = "./install/macos"

[tasks.typescript]
description = "Install TypeScript language server globally"
depends = ["brew"]
run = "npm install --global typescript"

[tasks.update-go]
description = "Install Go tools not managed by Mason"
depends = ["brew"]
run = """
export GOPATH="$HOME/projects/go"
# gopls, golangci-lint, and jsonnet-language-server are managed by Mason (nvim).
# golangci-lint-langserver wraps golangci-lint for LSP and is not in Mason.
go install github.com/nametake/golangci-lint-langserver@latest
"""

[tasks.packages]
description = "Install all packages and run setup"
depends = ["fonts", "typescript", "update-go", "neovim-setup"]

[tasks.setup]
description = "Full machine setup — run after bootstrap.sh"
depends = ["packages", "osx-settings"]
